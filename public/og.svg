<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e9f1ef"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="8" fill="url(#brand)"/>

  <!-- logo + wordmark -->
  <g transform="translate(80,62)">
    <rect width="64" height="64" rx="18" fill="url(#brand)"/>
    <g stroke="#ffffff" stroke-width="3.4" stroke-linecap="round" opacity="0.9">
      <path d="M20 23 L40 32"/>
      <path d="M20 41 L40 32"/>
    </g>
    <circle cx="20" cy="23" r="5.4" fill="#ffffff"/>
    <circle cx="20" cy="41" r="5.4" fill="#ffffff"/>
    <circle cx="42" cy="32" r="7.6" fill="#ffffff"/>
    <circle cx="42" cy="32" r="3.4" fill="#0ea5e9"/>
  </g>
  <text x="162" y="103" font-family="Inter, system-ui, 'Segoe UI', Arial, sans-serif" font-size="30" font-weight="700" fill="#0f172a">Tableau Lineage Visualizer</text>

  <!-- headline -->
  <text x="80" y="252" font-family="Inter, system-ui, 'Segoe UI', Arial, sans-serif" font-size="62" font-weight="800" fill="#0f172a">See the dependencies</text>
  <text x="80" y="322" font-family="Inter, system-ui, 'Segoe UI', Arial, sans-serif" font-size="62" font-weight="800" fill="#0f172a">inside any Tableau</text>
  <text x="80" y="392" font-family="Inter, system-ui, 'Segoe UI', Arial, sans-serif" font-size="62" font-weight="800" fill="#0f172a">workbook</text>

  <!-- subtitle -->
  <text x="82" y="452" font-family="Inter, system-ui, 'Segoe UI', Arial, sans-serif" font-size="27" fill="#475569">Calculated-field lineage &amp; metadata, in your browser.</text>

  <!-- url + tags -->
  <text x="80" y="566" font-family="Inter, system-ui, 'Segoe UI', Arial, sans-serif" font-size="26" font-weight="700" fill="#0ea5e9">tableau-lineage.com</text>
  <text x="345" y="566" font-family="Inter, system-ui, 'Segoe UI', Arial, sans-serif" font-size="22" fill="#64748b">Free &#183; Open source &#183; Privacy-first</text>

  <!-- graph motif -->
  <g fill="none" stroke-width="4" stroke-linecap="round">
    <path d="M865 250 L990 330" stroke="#22c55e"/>
    <path d="M865 410 L990 330" stroke="#22c55e"/>
    <path d="M865 330 L990 330" stroke="#ec4899"/>
    <path d="M1086 330 L1122 330" stroke="#0ea5e9"/>
  </g>
  <circle cx="865" cy="250" r="28" fill="#dcfce7" stroke="#22c55e" stroke-width="4"/>
  <circle cx="865" cy="410" r="28" fill="#dcfce7" stroke="#22c55e" stroke-width="4"/>
  <rect x="845" y="310" width="40" height="40" rx="5" transform="rotate(45 865 330)" fill="#fce7f3" stroke="#ec4899" stroke-width="4"/>
  <rect x="990" y="296" width="96" height="68" rx="13" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="4"/>
  <text x="1038" y="343" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="30" font-weight="700" fill="#0369a1">fx</text>
  <rect x="1122" y="302" width="56" height="56" rx="11" fill="#ede9fe" stroke="#8b5cf6" stroke-width="4"/>
  <g stroke="#8b5cf6" stroke-width="3.5" stroke-linecap="round">
    <path d="M1134 320 h32"/>
    <path d="M1134 332 h32"/>
    <path d="M1134 344 h22"/>
