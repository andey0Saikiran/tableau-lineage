    <!-- FAQ structured data (mirrors the on-page FAQ; keep in sync with SeoContent.tsx) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "What is a .twbx file?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "A .twbx is a Tableau packaged workbook. It is a single ZIP archive that bundles the workbook definition (a .twb XML file) together with its data extracts, images, and other resources, so an entire dashboard can be shared as one file."
            }
          },
          {
            "@type": "Question",
            "name": "How do I see calculated field dependencies in a Tableau workbook?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Drop the .twbx into Tableau Lineage Visualizer and it reads every calculated field, parameter, and data source, then draws the dependencies as an interactive graph. You can trace which fields feed a calculation, follow a parameter through the logic, and search the full data dictionary instead of clicking through the workbook by hand."
            }
          },
          {
            "@type": "Question",
            "name": "Is it safe to open or upload a .twbx file online?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "With this tool there is no upload at all. The file is read and parsed entirely in your browser, so your workbook and any data inside it never leave your computer. Because the project is open source, you can verify for yourself that there is no server to send the file to."
            }
          },
          {
            "@type": "Question",
            "name": "Can I view a Tableau workbook without Tableau Desktop?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. You do not need a Tableau license or any installation to inspect the structure of a workbook. This tool opens the packaged workbook in any modern browser and shows its fields, calculations, parameters, and lineage."
            }
          },
          {
            "@type": "Question",
            "name": "What does the dependency graph show?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Every field becomes a node: raw fields, calculated fields, parameters, level-of-detail (LOD) expressions, and table calculations, with edges showing what depends on what. Click a category to highlight just those nodes, or open the searchable dictionary to read each formula."
            }
          },
          {
            "@type": "Question",
            "name": "Can my AI assistant (Claude, Cursor) read Tableau workbooks with this?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. The same engine ships as an MCP server, tableau-lineage-mcp, so assistants like Claude and Cursor can list calculated fields, read formulas, and trace dependencies from a workbook on your disk. It runs locally on your machine, so the file is still never uploaded."
            }
          },
          {
            "@type": "Question",
            "name": "Is it free, and how is it different from Tableau Catalog?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "It is completely free and open source. Tableau Catalog is a strong option for organization-wide lineage if you have Data Management licensed and your content is published to Tableau Server or Cloud. This tool covers a narrower job: calculated-field and parameter lineage for a single .twbx file on your own machine, with nothing uploaded."
            }
          }
        ]
      }
    </script>
